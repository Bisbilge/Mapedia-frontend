<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="language" content="en" />
  <title>Mapedia: The Free Encyclopedia of Places</title>
  <meta name="description" content="Mapedia is a community-maintained open database of geographical locations. Discover, document, and share practical details about places worldwide under CC BY-SA 4.0." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="icon" type="image/svg+xml" href="/mapedia.svg" />

  <!-- Static OG fallback (shown before JS loads, e.g. link unfurlers) -->
  <meta property="og:site_name" content="Mapedia" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Mapedia | The Free Encyclopedia of Places" />
  <meta property="og:description" content="Open-source venue database with 5,700+ verified locations. Free to use, free to contribute, forever." />
  <meta property="og:url" content="https://mapedia.org" />
  <meta property="og:image" content="https://mapedia.org/og-image.png" />

  <!-- Twitter Card fallback -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mapedia | The Free Encyclopedia of Places" />
  <meta name="twitter:description" content="Open-source venue database with 5,700+ verified locations." />
  <meta name="twitter:image" content="https://mapedia.org/og-image.png" />
